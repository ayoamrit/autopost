# .github/workflows/daily.yml
# Runs the full TikTok quote automation process every day at 9: 00 AM UTC.

name: Daily TikTok Quote Automation

on:
  schedule:
    - cron: '0 9 * * *' # Runs every day at 9:00 AM UTC
  workflow_dispatch: # Allows manual triggering of the workflow

jobs:
    post-quote:
        runs-on: ubuntu-latest

        steps:
            # Step 1: Checkout the repository
            - name: Checkout repository
              uses: actions/checkout@v2

            # Step 2: Set up Python environment
            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: '3.11'

            # Step 3: Install dependencies
            - name: Install dependencies
              run: pip install -r requirements.txt

            # Step 4: Apply TikTok patch
            # The library needs a fix to dismiss TikTok's tutorial overlay.
            # Replace the installed upload.py with our patched version that includes the fix.
            - name: Apply tiktok-uploader patch
              run: |
                TIKTOK_PATCH=$(python -c "import tiktok_uploader; import os; print(os.path.dirname(tiktok_uploader.__file__))")
                cp src/tiktok_upload_patch.py $TIKTOK_PATCH/upload.py

            #Step 5: Install Playwright browser
            - name: Install Playwright browser
              run: playwright install chromium

            #Step 6: Restore service account from GitHub secrets
            - name: Restore service account file
              env: 
                GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
              run: echo "$GOOGLE_SERVICE_ACCOUNT_JSON" > service_account.json

            #Step 7: Decrypt cookies.txt file
            - name: Decrypt cookies file
              run: |
                gpg --quiet --batch --yes \
                --passphrase "${{ secrets.COOKIES_PASSPHRASE}}" \
                --output cookies.txt \
                --decrypt cookies.txt.gpg

            #Step 8: Create .env file from GitHub secrets
            - name: Create .env file
              run: |
                echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
                echo "GEMINI_MODEL=${{ secrets.GEMINI_MODEL }}" >> .env
                echo "GOOGLE_APPLICATION_CREDENTIALS=service_account.json" >> .env
            
            #Step 9: Create output folder
            - name: Create output directory
              run: mkdir -p output

            #Step 10: Run the pipeline script
            - name: Run pipeline
              run: python src/main.py